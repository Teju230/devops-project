apiVersion: v1
kind: Namespace
metadata:
  name: teju-ns

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
  namespace: teju-ns

spec:
  replicas: 2

  selector:
    matchLabels:
      app: devops-app

  template:
    metadata:
      labels:
        app: devops-app

    spec:
      containers:
        - name: devops-container

          image: IMAGE_PLACEHOLDER

          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: devops-service
  namespace: teju-ns

spec:
  selector:
    app: devops-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

  type: LoadBalancer